        h1 { text-align: center; margin-bottom: 30px; }
        .pet {
            background: #2a2a4a;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .pet h2 {
            margin-top: 0;
            color: #9bbc0f;
        }
        .states {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .state {
            text-align: center;
        }
        .state canvas {
            background: #9bbc0f;
            border: 2px solid #0f380f;
            image-rendering: pixelated;
        }
        .state-name {
            margin-top: 5px;
            font-size: 14px;
            color: #aaa;

    </style>
</head>

    <h1>🎮 像素宠物设计稿</h1>

    <div class="pet">
        <h2>🦞 龙虾 (Lobster)</h2>
        <div class="states">
            <div class="state">
                <canvas id="lobster_neutral" width="80" height="80"></canvas>
                <div class="state-name">neutral 正常</div>
            </div>
            <div class="state">
                <canvas id="lobster_happy" width="80" height="80"></canvas>

            </div>

            </div>
            <div class="state">
                <canvas id="lobster_sick" width="80" height="80"></canvas>
                <div class="state-name">sick 生病</div>
            </div>
        </div>
    </div>

    // 绘制精灵
    function drawSprite(canvasId, spriteData) {
        const canvas = document.getElementById(canvasId);
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = false;
        
        const scale = 5;
        const offsetX = 0;
        const offsetY = 0;
        
        for (let y = 0; y < 16; y++) {
            for (let x = 0; x < 16; x++) {
                const char = spriteData[y][x];
                const color = C[char];
                if (color) {
                    ctx.fillStyle = color;
                    ctx.fillRect(offsetX + x * scale, offsetY + y * scale, scale, scale);
                }
            }
        }
    }

    // 绘制所有精灵
    Object.keys(sprites).forEach(id => {
        drawSprite(id, sprites[id]);
    });
