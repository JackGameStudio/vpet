<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Jacks Pet</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Press Start 2P',monospace;overflow:hidden;padding:10px}
.d{background:linear-gradient(145deg,#c0392b,#e74c3c,#c0392b);border-radius:24px 24px 48px 48px;padding:12px 12px 18px;box-shadow:0 0 0 4px #922b21,0 0 0 8px #7b241c,0 12px 40px rgba(0,0,0,.6),inset 0 2px 4px rgba(255,255,255,.2);max-width:100%;width:100%;box-sizing:border-box}
.dt{display:flex;justify-content:center;align-items:center;gap:12px;margin-bottom:10px}
.led{width:6px;height:6px;border-radius:50%;background:#0f0;box-shadow:0 0 6px #0f0}
.led.warn{background:#f00;box-shadow:0 0 8px #f00}
.led.blink{animation:ledBlink .15s infinite}
@keyframes ledBlink{0%,100%{opacity:1}50%{opacity:.3}}
.bb{font-size:5px;color:rgba(255,255,255,.7);letter-spacing:1px}
.sf{background:#111;border-radius:8px;padding:8px;box-shadow:inset 0 2px 8px rgba(0,0,0,.9);margin-bottom:12px;margin-top:6px;display:flex;justify-content:center;width:100%;box-sizing:border-box}
#lcd{background:#9bbc0f;border-radius:4px;image-rendering:pixelated;image-rendering:crisp-edges;display:block;width:100%;height:auto;max-width:100%}
.bgt{display:flex;justify-content:center;gap:12px;margin-bottom:6px;margin-top:-8px}
.bg{display:flex;flex-direction:column;align-items:center;gap:3px}
.btn{width:50px;height:50px;border-radius:50%;border:none;cursor:pointer;background:linear-gradient(145deg,#4a4a5a,#2a2a3a);box-shadow:0 3px 0 #1a1a2a,0 4px 8px rgba(0,0,0,.4);color:rgba(255,255,255,.7);font-family:'Press Start 2P',monospace;font-size:7px;display:flex;align-items:center;justify-content:center;transition:transform .05s,box-shadow .05s;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.btn:active{transform:translateY(2px);box-shadow:0 1px 0 #1a1a2a}
.bsel{width:30px;height:30px;font-size:5px}
.ba{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.bac{width:100%;height:36px;border-radius:8px;background:linear-gradient(145deg,#3a3a4a,#2a2a3a);box-shadow:0 2px 0 #1a1a2a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:#fff;font-size:9px;border:none;cursor:pointer;touch-action:manipulation}
.bac:active{transform:translateY(1px);box-shadow:0 1px 0 #1a1a2a}
.bc{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.bcc{width:100%;height:36px;border-radius:8px;background:linear-gradient(145deg,#3a3a4a,#2a2a3a);box-shadow:0 2px 0 #1a1a2a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:#fff;font-size:9px;border:none;cursor:pointer;touch-action:manipulation}
.bcc:active{transform:translateY(1px);box-shadow:0 1px 0 #1a1a2a}
</style>
</head>
<body>
<div class="d">
  <div class="dt"><div class="led" id="ledL"></div><div class="bb">JACKS PET</div><div class="led" id="ledR"></div></div>
  <div class="sf"><canvas id="lcd" width="400" height="300"></canvas></div>
  <div class="bgt">
    <div class="bg"><button class="btn bsel" id="btnSel">SEL</button></div>
    <div class="bg"><button class="btn bsel" id="btnMnu">MNU</button></div>
  </div>
  <div class="ba">
    <button class="btn bac" id="btnA">FEED</button>
    <button class="btn bac" id="btnB">PLAY</button>
  </div>
  <div class="bc">
    <button class="btn bac" id="btnC">CLEAN</button>
    <button class="btn bac" id="btnD">EDU</button>
  </div>
</div>

function drawSprite(key, cx2, cy, scale) {
  var d = _S[key];
  if (!d) return;
  for (var i = 0; i < d.length; i++) {
    if (!d[i]) continue;
    var r = Math.floor(i / 16), c = i % 16;
    cx.fillStyle = d[i];
    cx.fillRect(Math.round(cx2 + c * scale), Math.round(cy + r * scale), Math.ceil(scale), Math.ceil(scale));
  }
}

// Game State
var ST = {
  petType: "lobster",
  phase: 0,
  hunger: 80, happiness: 80, cleanliness: 90, discipline: 70,
  hp: 100, poops: 0, dead: false,
  ageMinutes: 0, feedTimer: 0, cooldown: 0, hatchP: 0
};
var menu = false, selIdx = 0, fc = 0, warn = false;
var AU_ON = true, AU_CTX = null;
var ledBlinkTimer = 0; // 互动LED闪烁计时

// LED elements
var ledL, ledR;

function initLED() {
  ledL = document.getElementById("ledL");
  ledR = document.getElementById("ledR");
}

function updateLEDs() {
  if (!ledL || !ledR) return;
  var bad = ST.hp < 30 || ST.hunger < 20 || ST.happiness < 20 || ST.cleanliness < 20;
  if (bad && !ST.dead) {
    ledL.className = "led warn blink";
    ledR.className = "led warn blink";
  } else {
    ledL.className = "led";
    ledR.className = "led";
  }
}

function flashLEDs() {
  if (!ledL || !ledR) return;
  ledL.className = "led blink";
  ledR.className = "led blink";
  setTimeout(function() {
    updateLEDs();
  }, 300);
}

// Canvas
var cv = document.getElementById("lcd");
var cx = cv.getContext("2d");
cx.imageSmoothingEnabled = false;

// Audio
function initAU() { try { AU_CTX = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} }
function aur() { if (AU_CTX && AU_CTX.state === "suspended") AU_CTX.resume(); }
function beep(f, d, t, v) {
  if (!AU_CTX || !AU_ON) return;
  var o = AU_CTX.createOscillator(), g = AU_CTX.createGain();
  o.type = t || "sine"; o.frequency.value = f;
  g.gain.setValueAtTime(v || 0.1, AU_CTX.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AU_CTX.currentTime + d);
  o.connect(g); g.connect(AU_CTX.destination);
  o.start(); o.stop(AU_CTX.currentTime + d);
}
function sfx(t) {
  if (!AU_CTX || !AU_ON) return;
  switch(t) {
    case "feed": beep(523,0.08); beep(659,0.08,undefined,0.1); beep(784,0.15,undefined,0.1); break;
    case "play": for(var i=0;i<4;i++) beep(440+i*110,0.06,undefined,0.1); break;
    case "clean": beep(300,0.1,"sawtooth"); beep(400,0.1,"sawtooth"); beep(500,0.15,"sawtooth"); break;
    case "study": beep(880,0.12,"triangle"); beep(1047,0.2,"triangle"); break;
    case "poop": beep(150,0.3,"sawtooth",0.08); break;
    case "warn": for(var i=0;i<3;i++) beep(330,0.05,undefined,0.15); break;
    case "death": for(var i=0;i<6;i++) beep(440-i*60,0.15,undefined,0.15); break;
    case "hatch": for(var i=0;i<8;i++) beep(330+i*110,0.06,undefined,0.12); break;
    case "select": beep(660,0.05); break;
    case "ok": beep(880,0.08); beep(1100,0.1,undefined,0.1); break;
  }
}

// Drawing helpers
function rct(x,y,w,h,c) { cx.fillStyle=c; cx.fillRect(x,y,w,h); }
function txt(t,x,y,c,s) {
  cx.fillStyle=c;
  cx.font = Math.round(24*(s||1)) + "px 'Press Start 2P',monospace";
  cx.fillText(t, Math.round(x), Math.round(y));
}

// Pet rendering - PNG Sprite
var petImages = {};
var spriteLoaded = false;

function loadSprites() {
  var keys = Object.keys(SPRITE_DATA);
  var loaded = 0;
  keys.forEach(function(name) {
    if (!SPRITE_DATA[name]) { loaded++; return; }
    var img = new Image();
    img.onload = function() {
      petImages[name] = img;
      loaded++;
      if (loaded >= keys.length) spriteLoaded = true;
    };
    img.onerror = function() {
      petImages[name] = null;
      loaded++;
      if (loaded >= keys.length) spriteLoaded = true;
    };
    img.src = SPRITE_DATA[name];
  });
}

function getPetState() {
  if (ST.happyTimer > 0) return 'happy';
  if (ST.hp < 30 || ST.hunger < 20) return 'sick';
  if (ST.happiness > 90) return 'happy';
  if (ST.happiness < 30) return 'sad';
  return 'neutral';
}

function getPetScale() {
  var baseScale = 1.8;
  var maxScale = 2.0;
  var growthTime = 5;
  var ageFactor = Math.min(1, ST.ageMinutes / growthTime);
  return baseScale + (maxScale - baseScale) * ageFactor;
}

function drawPet(x, y) {
  var bob = ST.dead ? 0 : Math.sin(fc * 0.08) * 4;
  var state = getPetState();
  var scale = getPetScale();
  var baseSize = 64;
  var size = Math.round(baseSize * scale);
  
  var spriteName = ST.petType + '_' + state;
  
  if (ST.petType === "lobster" && ST.lobsterColor !== undefined) {
    var states = ['neutral', 'happy', 'sad', 'sick'];
    var stateIndex = states.indexOf(state);
    if (stateIndex >= 0) {
      spriteName = LOBSTER_COLORS[ST.lobsterColor][stateIndex];
    }
  }
  
  var img = petImages[spriteName];
  
  if (img && spriteLoaded) {
    cx.drawImage(img, x - size/2, y - size/2 + bob, size, size);
    
    if (ST.dead) {
      cx.fillStyle = "#FFD700";
      var hx = x, hy = y - size/2 - 8;
      var r = 16;
      for (var dx = -r; dx <= r; dx++) {
        for (var dy = -5; dy <= 5; dy++) {
          if (Math.abs(dx*dx/(r*r) + dy*dy/25 - 1) < 0.5) {
            cx.fillRect(hx + dx, hy + dy, 3, 3);
          }
        }
      }
    }
  } else {
    var emoji = "🦞";
    if (ST.petType === "panda") emoji = "🐼";
    else if (ST.petType === "seal") emoji = "🦭";
    txt(emoji, x - 20, y + bob, DK, 3);
  }
}

// Main draw
function draw() {
  cx.fillStyle = BG;
  cx.fillRect(0, 0, W, H);

  // Top bar
  rct(0, 0, W, 26, MD);
  txt(PET_NAMES[ST.petType] || ST.petType, 10, 18, BG, 0.8);
  var m = Math.floor(ST.ageMinutes);
  txt(String(m).padStart(3,"0")+"m", W-50, 18, BG, 0.7);

  // Stats
  var bx = 10, by = 40, bw = 70, bh = 10;
  var bars = [
    {l:"F", v:ST.hunger},
    {l:"J", v:ST.happiness},
    {l:"C", v:ST.cleanliness},
    {l:"D", v:ST.discipline}
  ];
  bars.forEach(function(b, i) {
    var y = by + i * (bh + 16);
    txt(b.l, bx, y + 4, DK, 0.5);
    rct(bx + 18, y, bw, bh, LT);
    rct(bx + 18, y, Math.round((b.v / 100) * bw), bh, DK);
  });

  // HP
  var hy = by + 4 * (bh + 16);
  txt("HP", bx, hy + 4, ST.hp > 50 ? DK : "#c00", 0.5);
  rct(bx + 18, hy, bw, bh, LT);
  rct(bx + 18, hy, Math.round((ST.hp / 100) * bw), bh, ST.hp > 50 ? DK : "#c00");

  // Pet or Egg
  if (ST.phase === 0) {
    var eggImg = ST.hatchP < 50 ? petImages['egg_normal'] : petImages['egg_hatch'];
    if (!eggImg) eggImg = petImages['egg_normal'];
    
    var eggSize = 80 * 1.5;
    var shakeAmount = 1 + (ST.hatchP / 100) * 7;
    var shakeSpeed = 0.02 + (ST.hatchP / 100) * 0.08;
    var shake = Math.sin(fc * shakeSpeed) * shakeAmount;
    var eggX = W/2 - eggSize/2 + shake;
    var eggY = H/2 - eggSize/2 + Math.sin(fc * 0.08) * 4;
    
    if (eggImg) {
      cx.drawImage(eggImg, eggX, eggY, eggSize, eggSize);
    } else {
      txt("[ 蛋 ]", W/2 - 25, H/2 + 8, DK, 1.5);
    }
    // hatching下移60
    txt("HATCHING " + Math.floor(ST.hatchP) + "%", W/2 - 60, H/2 + 120, MD, 0.5);
  } else {
    drawPet(W/2, H/2 + 10);
  }

  // Poop
  if (ST.poops > 0) {
    for (var i = 0; i < ST.poops; i++) {
      txt("💩", W/2 - 45 + i * 35, H/2 + 100, DK, 1.3);
    }
  }
  
  // Menu
  if (menu) {
    rct(0, 0, W, H, "rgba(0,0,0,0.7)");
    MENU.forEach(function(m, i) {
      var sel = i === selIdx;
      txt((sel ? "> " : "  ") + m.l, W/2 - 50, 60 + i * 32, sel ? BG : MD, sel ? 1 : 0.8);
    });
  }

  // Dead
  if (ST.dead) {
    rct(0, H - 27, W, 27, MD);
    var deadMsg = "GAME OVER... PRESS SEL TO RESTART...";
    var deadScrollX = (fc * 0.5) % (W + 200) - 100;
    txt(deadMsg, deadScrollX, H - 8, BG, 0.5);
  }

  // Marquee
  var marqueeMsgs = [];
  if (ST.phase > 0 && !ST.dead) {
    if (ST.hunger < 30) marqueeMsgs.push("I AM HUNGRY!");
    if (ST.cleanliness < 30) marqueeMsgs.push("NEED CLEAN!");
    if (ST.happiness < 30) marqueeMsgs.push("I AM SAD...");
    if (ST.hp < 50) marqueeMsgs.push("HP LOW!");
    if (ST.poops > 0) marqueeMsgs.push("POOP HERE!");
    if (marqueeMsgs.length === 0) marqueeMsgs.push("I AM HAPPY ^_^", "LOVE U!", "PLAY WITH ME", "FEED ME!");
  }
  
  if (marqueeMsgs.length > 0) {
    rct(0, H - 27, W, 27, DK);
    var msg = marqueeMsgs[Math.floor(fc / 240) % marqueeMsgs.length];
    var scrollX = (fc * 0.5) % (W + 160) - 80;
    txt(msg, scrollX, H - 8, BG, 0.5);
  }

  // Warn
  if (warn && fc % 20 < 10) {
    rct(0, 0, W, H, "rgba(255,0,0,0.1)");
  }
  
  // 更新LED状态
  updateLEDs();
}

// Game loop
function loop() {
  fc++;

  if (ST.phase === 0 && !ST.dead) {
    ST.hatchP = Math.min(100, ST.hatchP + 0.05);
    if (ST.hatchP >= 100) {
      ST.phase = 1;
      sfx("hatch");
      save();
    }
  }

  if (!menu && !ST.dead && ST.phase > 0 && fc % 90 === 0) {
    ST.hunger = Math.max(0, ST.hunger - 0.2);
    ST.cleanliness = Math.max(0, ST.cleanliness - 0.15);
    if (ST.happiness > 50) ST.happiness = Math.max(0, ST.happiness - 0.1);
  }

  if (ST.feedTimer > 0) {
    ST.feedTimer -= 1/60;
    if (ST.feedTimer <= 0) {
      ST.poops++;
      sfx("poop");
      if (ST.poops >= 3) warn = true;
    }
  }

  if (ST.poops > 0 && fc % 180 === 0) {
    ST.happiness = Math.max(0, ST.happiness - 1);
  }

  if (ST.happyTimer > 0) {
    ST.happyTimer--;
  }

  if ((ST.hunger < 15 || ST.cleanliness < 15) && fc % 60 === 0) {
    ST.hp = Math.max(0, ST.hp - 1);
  }

  if (ST.hp <= 0 && !ST.dead) {
    ST.dead = true;
    sfx("death");
    save();
  }

  if (!ST.dead && ST.phase > 0) {
    ST.ageMinutes += 1/3600;
  }

  warn = ST.hunger < 20 || ST.cleanliness < 20 || ST.poops >= 3;
  if (ST.cooldown > 0) ST.cooldown -= 1/60;
  if (fc % 300 === 0) save();

  draw();
  requestAnimationFrame(loop);
}

// Actions
function doAction(a) {
  if (ST.cooldown > 0 && a !== "reset") return;
  if (ST.dead && a !== "reset") return;
  aur();

  switch(a) {
    case "feed":
      ST.hunger = Math.min(100, ST.hunger + 30);
      ST.feedTimer = 30;
      sfx("feed");
      ST.cooldown = 1;
      flashLEDs();
      break;
    case "play":
      ST.happiness = Math.min(100, ST.happiness + 25);
      ST.hunger = Math.max(0, ST.hunger - 10);
      ST.happyTimer = 210;
      sfx("play");
      ST.cooldown = 1;
      flashLEDs();
      break;
    case "clean":
      ST.cleanliness = Math.min(100, ST.cleanliness + 40);
      ST.poops = 0;
      warn = false;
      sfx("clean");
      ST.cooldown = 1;
      flashLEDs();
      break;
    case "study":
      ST.discipline = Math.min(100, ST.discipline + 20);
      sfx("study");
      ST.cooldown = 1;
      flashLEDs();
      break;
    case "reset":
      if (confirm("确定重置吗？")) {
        ST.petType = PET_TYPES[Math.floor(Math.random() * PET_TYPES.length)];
        if (ST.petType === "lobster") {
          ST.lobsterColor = randLobsterColor();
        } else {
          ST.lobsterColor = undefined;
        }
        localStorage.removeItem("denshiPet");
        ST = {petType: ST.petType, phase:0, hunger:80, happiness:80, cleanliness:90, discipline:70, hp:100, poops:0, dead:false, ageMinutes:0, feedTimer:0, cooldown:0, hatchP:0, lobsterColor: ST.lobsterColor, happyTimer:0};
        sfx("hatch");
      }
      break;
  }
  save();
}

function save() {
  ST.lastSave = Date.now();
  localStorage.setItem("denshiPet", JSON.stringify(ST));
}
function load() {
  var r = localStorage.getItem("denshiPet");
  if (!r) return;
  try {
    var s = JSON.parse(r);
    ST = {...ST, ...s};
  } catch(e) {}
}

// Buttons - with touch support
function addBtnEvents(id, handler) {
  var btn = document.getElementById(id);
  btn.addEventListener("click", function(e) { e.preventDefault(); handler(); });
  btn.addEventListener("touchstart", function(e) { e.preventDefault(); handler(); }, { passive: false });
}
addBtnEvents("btnA", function() { aur(); sfx("ok"); doAction("feed"); });
addBtnEvents("btnB", function() { aur(); sfx("ok"); doAction("play"); });
addBtnEvents("btnC", function() { aur(); sfx("ok"); doAction("clean"); });
addBtnEvents("btnD", function() { aur(); sfx("ok"); doAction("study"); });
addBtnEvents("btnSel", function() {
  aur();
  if (ST.dead) { doAction("reset"); return; }
  if (menu) {
    sfx("ok");
    doAction(MENU[selIdx].a);
    menu = false;
  } else {
    sfx("select");
    menu = !menu;
    selIdx = 0;
  }
});
addBtnEvents("btnMnu", function() {
  aur();
  if (menu) {
    sfx("select");
    selIdx = (selIdx + 1) % MENU.length;
  } else {
    sfx("select");
    menu = true;
    selIdx = 0;
  }
});

// Keyboard
document.addEventListener("keydown", function(e) {
  if (e.key === "ArrowLeft" || e.key === "a") { aur(); doAction("feed"); }
  if (e.key === "ArrowRight" || e.key === "d") { aur(); doAction("play"); }
  if (e.key === "ArrowUp" || e.key === "w") { aur(); if (menu) selIdx = (selIdx + MENU.length - 1) % MENU.length; }
  if (e.key === "ArrowDown" || e.key === "s") { aur(); document.getElementById("btnMnu").click(); }
  if (e.key === "Enter" || e.key === " ") { aur(); document.getElementById("btnSel").click(); }
  if (e.key === "Escape" || e.key === "q") { menu = false; }
});

// Init
initAU();
initLED();
load();
if (!localStorage.getItem("denshiPet")) {
  ST.petType = PET_TYPES[Math.floor(Math.random() * PET_TYPES.length)];
  if (ST.petType === "lobster") {
    ST.lobsterColor = randLobsterColor();
  }
}
loadSprites();
requestAnimationFrame(loop);
})();
